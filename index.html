<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Duck Pond</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <button id="menuButton" type="button" aria-label="Toggle settings panel">☰</button>

    <aside id="settings" aria-label="Duck pond settings">
      <h2>🦆 Duck Pond</h2>

      <label for="sizeSlider">Duck Size</label>
      <input id="sizeSlider" type="range" min="10" max="60" value="25" />
      <span id="sizeValue" aria-live="polite">25</span>

      <label for="speedSlider">Duck Speed</label>
      <input id="speedSlider" type="range" min="0.2" max="5" step="0.1" value="1" />
      <span id="speedValue" aria-live="polite">1</span>

      <label class="toggle" for="collisionToggle">
        <input id="collisionToggle" type="checkbox" checked />
        <span>Duck collisions</span>
      </label>

      <button id="disintegrateButton" type="button">✨ Disintegrate Duck</button>
    </aside>

    <div id="background" aria-hidden="true"></div>
    <canvas id="pond"></canvas>

    <script src="script.js"></script>
  </body>
</html>
